            <script>
// Utils for vis-network bindings
function neighbourhoodHighlight(params) {
    var allNodes = nodes.get({returnType:"Object"});
    var allEdges = edges.get({returnType:"Object"});
    
    if (params.nodes.length > 0) {
        var selectedNode = params.nodes[0];
        var connectedNodes = network.getConnectedNodes(selectedNode);
        var connectedEdges = network.getConnectedEdges(selectedNode);
        
        for (var nodeId in allNodes) {
            if (connectedNodes.indexOf(nodeId) === -1 && nodeId !== selectedNode) {
                allNodes[nodeId].color = {background: 'rgba(200,200,200,0.5)', border: 'rgba(200,200,200,0.5)'};
                allNodes[nodeId].font = {color: 'rgba(200,200,200,0.5)'};
            }
        }
        
        for (var edgeId in allEdges) {
            if (connectedEdges.indexOf(edgeId) === -1) {
                allEdges[edgeId].color = {color: 'rgba(200,200,200,0.1)', highlight: 'rgba(200,200,200,0.1)'};
            }
        }
    } else {
        for (var nodeId in allNodes) {
            allNodes[nodeId].color = undefined;
            allNodes[nodeId].font = undefined;
        }
        for (var edgeId in allEdges) {
            allEdges[edgeId].color = undefined;
        }
    }
    nodes.update(allNodes);
    edges.update(allEdges);
}

function selectNode(nodeId) {
    network.selectNodes([nodeId]);
    network.focus(nodeId, {scale: 1.2});
    neighbourhoodHighlight({nodes: [nodeId]});
}
</script>
